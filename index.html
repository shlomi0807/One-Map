<!DOCTYPE html>
<html>
<head>
    <title>One Piece Map</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="map-wrapper">
    <div id="map-container">
        <img src="images/world-map.jpeg" id="map" draggable="false">
        
        <div class="marker" id="luffy-marker">
            <img src="images/LuffyHead.png" alt="Luffy" draggable="false">
            
            <div class="info-popup">
                <h3>מונקי ד. לופי</h3>
                <p><strong>פרס:</strong> 3,000,000,000 ברי.</p>
                <p><strong>מיקום:</strong> באי אלבף.</p>
                <p><strong>סטטוס:</strong> בקרב נגד האלדר נייטס.</p>
                <p><strong>מצב גופני:</strong> מוכן לקרב!</p>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
